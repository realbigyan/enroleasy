<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img">
<title>Lumeteq — faceted crystal</title>
<desc>Lumeteq logo: a faceted crystal mark shading from dark navy to bright gold, beside the LUMETEQ wordmark and tagline.</desc>
<polygon points="170,60 90,140 148,162" fill="#1E293B" stroke="#0B1120" stroke-width="1.2" stroke-linejoin="round"/>
<polygon points="170,60 148,162 170,270" fill="#92662A" stroke="#0B1120" stroke-width="1.2" stroke-linejoin="round"/>
<polygon points="170,60 170,270 192,162" fill="#C2760F" stroke="#0B1120" stroke-width="1.2" stroke-linejoin="round"/>
<polygon points="170,60 192,162 250,140" fill="#F59E0B" stroke="#0B1120" stroke-width="1.2" stroke-linejoin="round"/>
<text x="320" y="200" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="80" letter-spacing="3" fill="#111827">LUMETEQ</text>
<text x="323" y="235" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="24" letter-spacing="1" fill="#6B7280">the future, illuminated</text>
</svg>
